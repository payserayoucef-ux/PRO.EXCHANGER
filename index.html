<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>النماذج الإدارية الجزائرية</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    font-family: Arial;
    direction: rtl;
    background:#f4f6f9;
    text-align:center;
}
.container{
    background:white;
    width:95%;
    max-width:700px;
    margin:20px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}
input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
}
button{
    background:#006400;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
}
#doc{
    width:210mm;
    min-height:297mm;
    padding:20mm;
    background:white;
    text-align:right;
    font-size:18px;
    margin:auto;
}
</style>
</head>
<body>

<div class="container">
<h2>النماذج الإدارية الجزائرية</h2>

<select id="type">
<option value="ccp">تصريح شرفي لفتح حساب CCP</option>
<option value="farm">شهادة استغلال أرض فلاحية</option>
<option value="neighbor">شهادة حسن الجوار</option>
</select>

<input type="text" id="nom" placeholder="الاسم واللقب">
<input type="text" id="birth" placeholder="تاريخ ومكان الميلاد">
<input type="text" id="address" placeholder="العنوان الكامل">
<input type="text" id="idnum" placeholder="رقم بطاقة التعريف">
<input type="text" id="extra" placeholder="معلومات إضافية">

<button onclick="generatePDF()">تحميل PDF</button>
</div>

<div id="doc"></div>

<script>
function generatePDF(){

    let type = document.getElementById("type").value;
    let nom = document.getElementById("nom").value;
    let birth = document.getElementById("birth").value;
    let address = document.getElementById("address").value;
    let idnum = document.getElementById("idnum").value;
    let extra = document.getElementById("extra").value;
    let today = new Date().toLocaleDateString('ar-DZ');

    let content = `
    <h3 style="text-align:center;">الجمهورية الجزائرية الديمقراطية الشعبية</h3>
    <hr>
    `;

    if(type === "ccp"){
        content += `
        <h3 style="text-align:center;">تصريح شرفي لفتح حساب CCP</h3>
        <p>أنا الممضي أسفله: ${nom}</p>
        <p>المولود في: ${birth}</p>
        <p>الساكن بـ: ${address}</p>
        <p>رقم بطاقة التعريف: ${idnum}</p>
        <p>أصرح بشرفي أنني لا أملك حساب CCP آخر.</p>
        `;
    }

    if(type === "farm"){
        content += `
        <h3 style="text-align:center;">طلب شهادة استغلال أرض فلاحية</h3>
        <p>أنا الممضي أسفله: ${nom}</p>
        <p>المولود في: ${birth}</p>
        <p>الساكن بـ: ${address}</p>
        <p>رقم بطاقة التعريف: ${idnum}</p>
        <p>أصرح أنني أستغل الأرض الواقعة بـ: ${extra}</p>
        `;
    }

    if(type === "neighbor"){
        content += `
        <h3 style="text-align:center;">طلب شهادة حسن الجوار</h3>
        <p>أنا الممضي أسفله: ${nom}</p>
        <p>المولود في: ${birth}</p>
        <p>الساكن بـ: ${address}</p>
        <p>رقم بطاقة التعريف: ${idnum}</p>
        <p>أطلب شهادة حسن الجوار لغرض: ${extra}</p>
        `;
    }

    content += `
    <br><br>
    <p>حرر في: ${today}</p>
    <br><br>
    <p style="text-align:left;">الإمضاء</p>
    `;

    let element = document.getElementById("doc");
    element.innerHTML = content;

    const opt = {
        margin:       0,
        filename:     'document.pdf',
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>

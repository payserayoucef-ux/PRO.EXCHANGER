<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>النماذج الإدارية الجزائرية</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial;
    direction: rtl;
    background:#f4f6f9;
    text-align:center;
}
.container{
    background:white;
    width:95%;
    max-width:700px;
    margin:20px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}
h2{
    color:#006400;
}
input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    background:#006400;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
    font-size:16px;
    border-radius:8px;
}
button:hover{
    background:#004d00;
}
</style>
</head>
<body>

<div class="container">
<h2>النماذج الإدارية الجزائرية</h2>

<select id="type">
<option value="ccp">تصريح شرفي لفتح حساب CCP</option>
<option value="farm">شهادة استغلال أرض فلاحية</option>
<option value="neighbor">شهادة حسن الجوار</option>
</select>

<input type="text" id="nom" placeholder="الاسم واللقب">
<input type="text" id="birth" placeholder="تاريخ ومكان الميلاد">
<input type="text" id="address" placeholder="العنوان الكامل">
<input type="text" id="idnum" placeholder="رقم بطاقة التعريف">
<input type="text" id="extra" placeholder="معلومات إضافية (موقع الأرض / سبب الطلب...)">

<button onclick="generatePDF()">تحميل الملف PDF</button>
</div>

<script>
async function generatePDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let type = document.getElementById("type").value;
    let nom = document.getElementById("nom").value;
    let birth = document.getElementById("birth").value;
    let address = document.getElementById("address").value;
    let idnum = document.getElementById("idnum").value;
    let extra = document.getElementById("extra").value;

    let today = new Date().toLocaleDateString('ar-DZ');

    doc.setFont("Helvetica");
    doc.setFontSize(14);

    doc.text("الجمهورية الجزائرية الديمقراطية الشعبية", 105, 15, null, null, "center");
    doc.text("-------------------------------------------------", 105, 22, null, null, "center");

    if(type === "ccp"){
        doc.text("تصريح شرفي لفتح حساب بريدي جاري", 105, 35, null, null, "center");

        doc.text("أنا الممضي أسفله:", 10, 55);
        doc.text("الاسم واللقب: " + nom, 10, 65);
        doc.text("تاريخ ومكان الميلاد: " + birth, 10, 75);
        doc.text("العنوان: " + address, 10, 85);
        doc.text("رقم بطاقة التعريف: " + idnum, 10, 95);

        doc.text("أصرح بشرفي أنني لا أملك حساب CCP آخر.", 10, 110);
    }

    if(type === "farm"){
        doc.text("طلب شهادة استغلال أرض فلاحية", 105, 35, null, null, "center");

        doc.text("أنا الممضي أسفله:", 10, 55);
        doc.text("الاسم واللقب: " + nom, 10, 65);
        doc.text("تاريخ ومكان الميلاد: " + birth, 10, 75);
        doc.text("العنوان: " + address, 10, 85);
        doc.text("رقم بطاقة التعريف: " + idnum, 10, 95);

        doc.text("أصرح أنني أستغل الأرض الواقعة بـ: " + extra, 10, 110);
    }

    if(type === "neighbor"){
        doc.text("طلب شهادة حسن الجوار", 105, 35, null, null, "center");

        doc.text("أنا الممضي أسفله:", 10, 55);
        doc.text("الاسم واللقب: " + nom, 10, 65);
        doc.text("تاريخ ومكان الميلاد: " + birth, 10, 75);
        doc.text("العنوان: " + address, 10, 85);
        doc.text("رقم بطاقة التعريف: " + idnum, 10, 95);

        doc.text("أطلب شهادة حسن الجوار لغرض: " + extra, 10, 110);
    }

    doc.text("حرر في: " + today, 10, 140);
    doc.text("الإمضاء", 150, 160);

    doc.save("document.pdf");
}
</script>

</body>
</html>

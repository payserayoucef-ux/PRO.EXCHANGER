<script>
    function sync() {
        const fields = ['name', 'bDate', 'bPlace', 'idNum', 'iDate', 'auth', 'prov', 'stat'];
        fields.forEach(f => {
            const val = document.getElementById('in_' + f).value;
            // نستخدم innerHTML لضمان التنسيق أو textContent للأمان
            document.getElementById('out_' + f).textContent = val;
        });
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-content');
        
        // إعدادات احترافية لمنع "تخربط" النصوص العربية
        const opt = {
            margin:       [0, 0, 0, 0], 
            filename:     'تصريح_شرفي_مصحح.pdf',
            image:        { type: 'jpeg', quality: 1 }, // جودة الصورة القصوى
            html2canvas:  { 
                scale: 4, // رفع الدقة ليكون النص حاداً جداً عند الطباعة (مثل النص الحقيقي)
                useCORS: true, 
                letterRendering: false, // تعطيل هذا الخيار يمنع تباعد الحروف العربية
                allowTaint: true,
                logging: false
            },
            jsPDF: { 
                unit: 'mm', 
                format: 'a4', 
                orientation: 'portrait',
                precision: 32 // دقة عالية في تموضع العناصر
            }
        };

        // تنفيذ التحويل مع التأكد من أن الصفحة ثابتة
        html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
            // هذا السطر يضمن أن الملف لن يتحرك من مكانه عند الحفظ
        }).save();
    }

    // لتحديث التاريخ تلقائياً عند فتح الصفحة
    window.onload = function() {
        sync();
    };
</script>
